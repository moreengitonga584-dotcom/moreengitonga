<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ratiba — Smart Task Scheduler</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #12172B;
    --surface: #1B2140;
    --surface-2: #232B52;
    --line: #2E355C;
    --amber: #F2A93B;
    --coral: #E5533C;
    --mint: #4FC9A8;
    --text: #F5F3EE;
    --muted: #9AA0BE;
    --radius: 14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(1200px 600px at 90% -10%, rgba(242,169,59,0.10), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(79,201,168,0.08), transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:'Inter', system-ui, sans-serif;
    min-height:100vh;
  }
  .wrap{
    max-width:1180px;
    margin:0 auto;
    padding:40px 28px 80px;
  }
  header.top{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    gap:24px;
    margin-bottom:36px;
    flex-wrap:wrap;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:14px;
  }
  .brand .mark{
    width:44px;height:44px;
    border-radius:12px;
    background:conic-gradient(from 220deg, var(--amber), var(--coral), var(--amber));
    display:flex;align-items:center;justify-content:center;
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    color:#151833;
    font-size:20px;
  }
  h1{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:28px;
    margin:0;
    letter-spacing:-0.02em;
  }
  .tagline{
    color:var(--muted);
    font-size:13.5px;
    margin-top:2px;
  }
  .stats{
    display:flex;
    gap:22px;
  }
  .stat{
    text-align:right;
  }
  .stat .num{
    font-family:'IBM Plex Mono', monospace;
    font-size:22px;
    font-weight:500;
  }
  .stat .lbl{
    font-size:11px;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:.08em;
  }

  .layout{
    display:grid;
    grid-template-columns: 320px 1fr;
    gap:24px;
    align-items:start;
  }
  @media (max-width: 860px){
    .layout{grid-template-columns:1fr;}
  }

  .panel{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:22px;
  }
  .panel h2{
    font-family:'Space Grotesk',sans-serif;
    font-size:15px;
    margin:0 0 16px;
    font-weight:600;
    color:var(--text);
  }
  .field{
    margin-bottom:14px;
  }
  .field label{
    display:block;
    font-size:12px;
    color:var(--muted);
    margin-bottom:6px;
  }
  .field input, .field select{
    width:100%;
    background:var(--surface-2);
    border:1px solid var(--line);
    border-radius:9px;
    padding:10px 12px;
    color:var(--text);
    font-family:'Inter',sans-serif;
    font-size:14px;
  }
  .field input:focus, .field select:focus{
    outline:2px solid var(--amber);
    outline-offset:1px;
  }
  .priority-row{
    display:flex;
    gap:8px;
  }
  .priority-row button{
    flex:1;
    padding:9px 0;
    border-radius:9px;
    border:1px solid var(--line);
    background:var(--surface-2);
    color:var(--muted);
    font-size:12.5px;
    font-weight:600;
    cursor:pointer;
    transition:all .15s ease;
  }
  .priority-row button[data-p="High"].active{background:rgba(229,83,60,0.18);border-color:var(--coral);color:var(--coral);}
  .priority-row button[data-p="Medium"].active{background:rgba(242,169,59,0.18);border-color:var(--amber);color:var(--amber);}
  .priority-row button[data-p="Low"].active{background:rgba(79,201,168,0.18);border-color:var(--mint);color:var(--mint);}

  .add-btn{
    width:100%;
    margin-top:6px;
    padding:12px 0;
    border:none;
    border-radius:9px;
    background:var(--amber);
    color:#1A1300;
    font-weight:600;
    font-size:14px;
    cursor:pointer;
    font-family:'Space Grotesk',sans-serif;
  }
  .add-btn:hover{ filter:brightness(1.06); }

  .tabs{
    display:flex;
    gap:6px;
    margin-bottom:18px;
  }
  .tabs button{
    background:transparent;
    border:1px solid var(--line);
    color:var(--muted);
    padding:7px 14px;
    border-radius:20px;
    font-size:12.5px;
    cursor:pointer;
    font-family:'Inter',sans-serif;
  }
  .tabs button.active{
    background:var(--surface-2);
    color:var(--text);
    border-color:var(--amber);
  }

  .group-label{
    font-family:'Space Grotesk',sans-serif;
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:.1em;
    color:var(--muted);
    margin:22px 0 10px;
  }
  .group-label:first-child{margin-top:0;}

  .task{
    display:flex;
    align-items:center;
    gap:16px;
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:12px;
    padding:14px 16px;
    margin-bottom:10px;
  }
  .task.done{ opacity:0.5; }
  .task.done .title{ text-decoration:line-through; }

  .ring{
    position:relative;
    width:42px;height:42px;
    flex:none;
  }
  .ring svg{ transform:rotate(-90deg); }
  .ring circle{ fill:none; stroke-width:4; }
  .ring .bg{ stroke:var(--line); }
  .ring .fg{ stroke-linecap:round; transition:stroke-dashoffset .3s ease; }
  .ring .pct{
    position:absolute; inset:0;
    display:flex;align-items:center;justify-content:center;
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;
    color:var(--muted);
  }

  .task .body{ flex:1; min-width:0; }
  .task .title{
    font-size:14.5px;
    font-weight:500;
    margin-bottom:3px;
  }
  .task .meta{
    font-size:12px;
    color:var(--muted);
    display:flex;
    gap:10px;
    flex-wrap:wrap;
  }
  .badge{
    font-size:10.5px;
    font-weight:600;
    padding:2px 8px;
    border-radius:20px;
    text-transform:uppercase;
    letter-spacing:.04em;
  }
  .badge.High{ background:rgba(229,83,60,0.18); color:var(--coral); }
  .badge.Medium{ background:rgba(242,169,59,0.18); color:var(--amber); }
  .badge.Low{ background:rgba(79,201,168,0.18); color:var(--mint); }

  .task .actions{
    display:flex;
    gap:8px;
    flex:none;
  }
  .icon-btn{
    width:32px;height:32px;
    border-radius:8px;
    border:1px solid var(--line);
    background:var(--surface-2);
    color:var(--muted);
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    font-size:14px;
  }
  .icon-btn:hover{ color:var(--text); border-color:var(--amber); }

  .empty{
    text-align:center;
    padding:60px 20px;
    color:var(--muted);
    border:1px dashed var(--line);
    border-radius:var(--radius);
    font-size:13.5px;
  }

  footer{
    margin-top:40px;
    text-align:center;
    color:var(--muted);
    font-size:11.5px;
  }

  @media (prefers-reduced-motion: reduce){
    *{ transition:none !important; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header class="top">
    <div class="brand">
      <div class="mark">R</div>
      <div>
        <h1>Ratiba</h1>
        <div class="tagline">Your day, ranked by what actually matters</div>
      </div>
    </div>
    <div class="stats">
      <div class="stat"><div class="num" id="statTotal">0</div><div class="lbl">Open</div></div>
      <div class="stat"><div class="num" id="statUrgent">0</div><div class="lbl">Urgent</div></div>
      <div class="stat"><div class="num" id="statDone">0</div><div class="lbl">Done</div></div>
    </div>
  </header>

  <div class="layout">
    <div class="panel">
      <h2>Add a task</h2>
      <div class="field">
        <label for="taskTitle">What needs doing</label>
        <input id="taskTitle" type="text" placeholder="e.g. Submit AI assignment" maxlength="80">
      </div>
      <div class="field">
        <label for="taskDate">Deadline</label>
        <input id="taskDate" type="date">
      </div>
      <div class="field">
        <label>Priority</label>
        <div class="priority-row" id="priorityRow">
          <button data-p="Low">Low</button>
          <button data-p="Medium" class="active">Medium</button>
          <button data-p="High">High</button>
        </div>
      </div>
      <div class="field">
        <label for="taskCategory">Category (optional)</label>
        <input id="taskCategory" type="text" placeholder="e.g. School, BaleTrack, Errands" maxlength="24">
      </div>
      <button class="add-btn" id="addBtn">Add task</button>
    </div>

    <div class="main">
      <div class="tabs" id="tabs">
        <button data-tab="open" class="active">Open</button>
        <button data-tab="today">Due today</button>
        <button data-tab="all">All</button>
        <button data-tab="done">Completed</button>
      </div>
      <div id="list"></div>
    </div>
  </div>

  <footer>Ratiba stores tasks locally in this browser. Built as an IBL AI-tools assignment.</footer>
</div>

<script>
(function(){
  var STORAGE_KEY = 'ratiba_tasks_v1';
  var state = { tasks: [], tab: 'open', priority: 'Medium' };

  function loadTasks(){
    try{
      var raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : seed();
    }catch(e){
      return seed();
    }
  }
  function saveTasks(){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state.tasks)); }catch(e){ /* storage unavailable, continue in-memory */ }
  }
  function seed(){
    var today = new Date();
    function d(offset){
      var t = new Date(today); t.setDate(t.getDate()+offset);
      return t.toISOString().slice(0,10);
    }
    return [
      { id: uid(), title: 'Submit AI tools assignment', date: d(0), priority: 'High', category: 'School', done: false },
      { id: uid(), title: 'Fix BaleTrack offline sync bug', date: d(2), priority: 'Medium', category: 'BaleTrack', done: false },
      { id: uid(), title: 'Draft data protection presentation', date: d(5), priority: 'Low', category: 'School', done: false }
    ];
  }
  function uid(){ return Math.random().toString(36).slice(2,10); }

  function daysUntil(dateStr){
    if(!dateStr) return 999;
    var today = new Date(); today.setHours(0,0,0,0);
    var due = new Date(dateStr+'T00:00:00');
    return Math.round((due-today)/86400000);
  }

  // Urgency score 0-100: combines priority weight and closeness of deadline.
  function urgency(task){
    var pw = { High: 1, Medium: 0.6, Low: 0.3 }[task.priority] || 0.5;
    var days = daysUntil(task.date);
    var proximity;
    if(days <= 0) proximity = 1;
    else if(days >= 14) proximity = 0.05;
    else proximity = 1 - (days/14);
    var score = (pw*0.55 + proximity*0.45) * 100;
    return Math.max(4, Math.min(100, Math.round(score)));
  }

  function ringSVG(pct, colorVar){
    var r = 16, c = 2*Math.PI*r;
    var offset = c - (pct/100)*c;
    return '<div class="ring"><svg width="42" height="42">' +
      '<circle class="bg" cx="21" cy="21" r="'+r+'"></circle>' +
      '<circle class="fg" cx="21" cy="21" r="'+r+'" stroke="'+colorVar+'" stroke-dasharray="'+c+'" stroke-dashoffset="'+offset+'"></circle>' +
      '</svg><div class="pct">'+pct+'</div></div>';
  }

  function urgencyColor(pct){
    if(pct >= 70) return 'var(--coral)';
    if(pct >= 40) return 'var(--amber)';
    return 'var(--mint)';
  }

  function fmtDate(dateStr){
    if(!dateStr) return 'No date';
    var days = daysUntil(dateStr);
    var d = new Date(dateStr+'T00:00:00');
    var label = d.toLocaleDateString(undefined, { month:'short', day:'numeric' });
    if(days === 0) return 'Today · ' + label;
    if(days === 1) return 'Tomorrow · ' + label;
    if(days < 0) return Math.abs(days)+'d overdue · '+label;
    return 'in '+days+'d · '+label;
  }

  function render(){
    var open = state.tasks.filter(function(t){ return !t.done; });
    var done = state.tasks.filter(function(t){ return t.done; });
    var urgent = open.filter(function(t){ return urgency(t) >= 70; });

    document.getElementById('statTotal').textContent = open.length;
    document.getElementById('statUrgent').textContent = urgent.length;
    document.getElementById('statDone').textContent = done.length;

    var visible;
    if(state.tab === 'open') visible = open;
    else if(state.tab === 'today') visible = open.filter(function(t){ return daysUntil(t.date) <= 0; });
    else if(state.tab === 'done') visible = done;
    else visible = state.tasks.slice();

    visible = visible.slice().sort(function(a,b){
      if(a.done !== b.done) return a.done ? 1 : -1;
      return urgency(b) - urgency(a);
    });

    var list = document.getElementById('list');
    if(visible.length === 0){
      list.innerHTML = '<div class="empty">Nothing here. Add a task on the left to get started.</div>';
      return;
    }

    var html = '';
    visible.forEach(function(t){
      var pct = urgency(t);
      html += '<div class="task '+(t.done?'done':'')+'" data-id="'+t.id+'">' +
        ringSVG(t.done ? 0 : pct, urgencyColor(pct)) +
        '<div class="body">' +
          '<div class="title">'+escapeHTML(t.title)+'</div>' +
          '<div class="meta">' +
            '<span class="badge '+t.priority+'">'+t.priority+'</span>' +
            '<span>'+fmtDate(t.date)+'</span>' +
            (t.category ? '<span>· '+escapeHTML(t.category)+'</span>' : '') +
          '</div>' +
        '</div>' +
        '<div class="actions">' +
          '<button class="icon-btn" data-action="toggle" title="Mark done">'+(t.done ? '↺' : '✓')+'</button>' +
          '<button class="icon-btn" data-action="delete" title="Delete">✕</button>' +
        '</div>' +
      '</div>';
    });
    list.innerHTML = html;
  }

  function escapeHTML(s){
    return s.replace(/[&<>"']/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }

  document.getElementById('priorityRow').addEventListener('click', function(e){
    var btn = e.target.closest('button');
    if(!btn) return;
    state.priority = btn.dataset.p;
    this.querySelectorAll('button').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
  });

  document.getElementById('addBtn').addEventListener('click', function(){
    var titleEl = document.getElementById('taskTitle');
    var title = titleEl.value.trim();
    if(!title){ titleEl.focus(); return; }
    var date = document.getElementById('taskDate').value;
    var category = document.getElementById('taskCategory').value.trim();
    state.tasks.push({ id: uid(), title: title, date: date, priority: state.priority, category: category, done: false });
    saveTasks();
    titleEl.value = '';
    document.getElementById('taskCategory').value = '';
    document.getElementById('taskDate').value = '';
    render();
  });

  document.getElementById('taskTitle').addEventListener('keydown', function(e){
    if(e.key === 'Enter') document.getElementById('addBtn').click();
  });

  document.getElementById('tabs').addEventListener('click', function(e){
    var btn = e.target.closest('button');
    if(!btn) return;
    state.tab = btn.dataset.tab;
    this.querySelectorAll('button').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    render();
  });

  document.getElementById('list').addEventListener('click', function(e){
    var btn = e.target.closest('button');
    if(!btn) return;
    var row = e.target.closest('.task');
    var id = row.dataset.id;
    var task = state.tasks.find(function(t){ return t.id === id; });
    if(!task) return;
    if(btn.dataset.action === 'toggle'){ task.done = !task.done; }
    if(btn.dataset.action === 'delete'){ state.tasks = state.tasks.filter(function(t){ return t.id !== id; }); }
    saveTasks();
    render();
  });

  state.tasks = loadTasks();
  render();
})();
</script>
</body>
</html>
